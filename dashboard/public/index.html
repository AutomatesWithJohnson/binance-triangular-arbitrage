<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Arbitrage Scanner</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
        h1 { color: #f0f6fc; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #8b949e; margin-bottom: 20px; font-size: 0.9em; }
        .balance-container { text-align: center; margin-bottom: 30px; font-size: 1.5em; color: #e6edf3; font-weight: bold; background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid #30363d; display: inline-block; }
        .center-wrap { text-align: center; }
        .container { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: row; gap: 20px; }
        .col { flex: 1; display: flex; flex-direction: column; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); flex: 1; display: flex; flex-direction: column; }
        .log-box { flex: 1; height: 500px; overflow-y: auto; background: #010409; padding: 15px; border-radius: 6px; font-family: 'Courier New', Courier, monospace; font-size: 14px; border: 1px solid #30363d; }
        .log-entry { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #21262d; }
        .log-entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .timestamp { color: #8b949e; font-size: 0.85em; }
        .route { color: #58a6ff; font-weight: bold; margin-top: 4px; }
        .profit { color: #3fb950; font-weight: bold; font-size: 1.1em; }
        .loss { color: #f85149; font-weight: bold; font-size: 1.1em; }
        .details { color: #b7bacc; margin-top: 4px; font-size: 0.9em; }
        .sim-tag { display: inline-block; background: #d29922; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.75em; font-weight: bold; margin-left: 8px; vertical-align: middle;}
        .trade-tag { display: inline-block; background: #238636; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.75em; font-weight: bold; margin-left: 8px; vertical-align: middle;}
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #010409; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b949e; }
    </style>
</head>
<body>
    <h1>🚀 Triangular Arbitrage Scanner</h1>
    <div class="subtitle">Live Monitoring Dashboard • Binance Spot Testnet</div>
    
    <div class="center-wrap">
        <div class="balance-container" id="balance-display">
            Total Balance: Loading...
        </div>
    </div>

    <div class="container">
        <!-- Detection Logs -->
        <div class="col">
            <div class="card">
                <h3 style="margin-top: 0; color: #e6edf3;">Live Detection Logs <span id="status-indicator" style="color: #3fb950; font-size: 0.8em; margin-left: 10px;">● Connected</span></h3>
                <div class="log-box" id="logs">
                    <div style="color: #8b949e; text-align: center; margin-top: 200px;" id="waiting-msg">
                        Waiting for arbitrage opportunities to be detected...
                    </div>
                </div>
            </div>
        </div>

        <!-- Trade History -->
        <div class="col">
            <div class="card">
                <h3 style="margin-top: 0; color: #e6edf3;">Live Trade History</h3>
                <div class="log-box" id="trades">
                    <div style="color: #8b949e; text-align: center; margin-top: 200px;" id="trade-waiting-msg">
                        Waiting for trades to execute...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Load Socket.io client -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const logsContainer = document.getElementById('logs');
        const tradesContainer = document.getElementById('trades');
        const waitingMsg = document.getElementById('waiting-msg');
        const tradeWaitingMsg = document.getElementById('trade-waiting-msg');
        const indicator = document.getElementById('status-indicator');
        const balanceDisplay = document.getElementById('balance-display');

        socket.on('connect', () => {
            indicator.style.color = '#3fb950';
            indicator.textContent = '● Connected to Scanner';
        });

        socket.on('disconnect', () => {
            indicator.style.color = '#f85149';
            indicator.textContent = '● Disconnected Server Offline';
            balanceDisplay.textContent = 'Total Balance: Disconnected';
        });

        socket.on('account_balance', (data) => {
            balanceDisplay.innerHTML = `Total Balance: <span style="color:#58a6ff;">$${data.totalUSDTValue.toFixed(2)} USDT</span>`;
        });

        socket.on('arbitrage_found', (data) => {
            if (waitingMsg) waitingMsg.remove();

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const timeStr = new Date(data.timestamp).toLocaleTimeString();
            
            entry.innerHTML = `
                <div class="timestamp">[${timeStr}] Arbitrage Detected <span class="sim-tag">TESTNET</span></div>
                <div class="route">${data.route}</div>
                <div>Theoretical Profit: <span class="profit">$${data.netProfit} (+${data.profitPercent}%)</span></div>
                <div class="details">Started with $${data.startAmount} ${data.base}. Ended with $${data.endAmount} ${data.base}.</div>
            `;
            
            logsContainer.appendChild(entry);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        });

        socket.on('trade_status', (data) => {
            if (tradeWaitingMsg) tradeWaitingMsg.remove();

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const timeStr = new Date(data.timestamp).toLocaleTimeString();
            
            let statusHtml = '';
            if (data.status === 'OPEN') {
                statusHtml = `
                    <div class="timestamp">[${timeStr}] Trade Executing <span class="trade-tag">OPENING</span></div>
                    <div class="route">${data.route}</div>
                    <div class="details">Sending orders to Binance Testnet...</div>
                `;
            } else if (data.status === 'CLOSED') {
                let isProfit = data.realPnl > 0;
                let colorClass = isProfit ? 'profit' : 'loss';
                let sign = isProfit ? '+' : '';
                
                statusHtml = `
                    <div class="timestamp">[${timeStr}] Trade Finished <span class="trade-tag" style="background:#8957e5;">CLOSED</span></div>
                    <div class="route">${data.route}</div>
                    <div>Real PNL: <span class="${colorClass}">${sign}$${data.realPnl}</span></div>
                    <div class="details" style="color: #7ee787; font-style: italic;">Steps Executed: ${data.steps}</div>
                `;
            } else if (data.status === 'ERROR') {
                statusHtml = `
                    <div class="timestamp">[${timeStr}] Trade Failed <span class="trade-tag" style="background:#f85149;">ERROR</span></div>
                    <div class="route">${data.route}</div>
                    <div class="details" style="color:#f85149;">${data.error}</div>
                `;
            }

            entry.innerHTML = statusHtml;
            tradesContainer.appendChild(entry);
            tradesContainer.scrollTop = tradesContainer.scrollHeight;
        });
    </script>
</body>
</html>
